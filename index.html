<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8">
    <title>بوابة الدفع السريع - يوسف</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 40px; line-height: 1.8; }
        .payment-card { border: 2px solid #eee; padding: 20px; border-radius: 10px; max-width: 400px; margin: 0 auto; }
        .btn { display: block; width: 100%; padding: 15px; margin: 10px 0; font-size: 18px; cursor: pointer; border: none; border-radius: 5px; text-decoration: none; color: white; }
        .btn-egp { background-color: #28a745; } /* لون أخضر للفيزا المصرية */
        .btn-usd { background-color: #007bff; } /* لون أزرق للفيزا العالمية */
    </style>
</head>
<body>

    <div class="payment-card">
        <h1>إتمام عملية الشراء</h1>
        <p>المبلغ المطلوب: <strong>100 جنيه مصري</strong></p>
        <p>يرجى اختيار طريقة الدفع المناسبة لك:</p>

        <a href="https://api.gammal.tech/sdk/pay/link/?pid=121&amount=100&desc=My+Product&currency=EGP" 
           class="btn btn-egp">
            الدفع ببطاقة بنكية مصرية (Visa / Master)
        </a>

        <a href="https://api.gammal.tech/sdk/pay/link/?pid=121&amount=2&desc=My+Product&currency=USD" 
           class="btn btn-usd">
            Payment with International Card (USD)
        </a>

    </div>

    <p style="margin-top: 20px; color: #666;">سيتم تحويلك إلى صفحة مؤمنة لإتمام الدفع دون الحاجة لتسجيل دخول.</p>

</body>
</html>
