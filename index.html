<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8">
    <title>بوابة الدفع</title>
    <script src="https://api.gammal.tech/sdk-web.js"></script>
</head>
<body style="text-align:center; padding-top:50px;">

    <h2>مشروع يوسف - الدفع السريع</h2>

    <button id="payBtn" style="padding:20px; font-size:18px;">
        اضغط هنا لفتح نافذة الدفع
    </button>

    <div id="status" style="margin-top:20px; color:blue;"></div>

    <script>
        document.getElementById('payBtn').onclick = function() {
            document.getElementById('status').innerText = "جاري محاولة فتح النافذة... يرجى فحص شريط العنوان";
            
            // استدعاء مباشر جداً لتقليل احتمالية الحظر
            GammalTech.pay(100, 'My Product', function (response) {
                alert('تمت العملية بنجاح');
            });
        };
    </script>

</body>
</html>
