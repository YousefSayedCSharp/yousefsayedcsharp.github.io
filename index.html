<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحة الدفع - MyFirstApp</title>

    <script src="https://api.gammal.tech/sdk-web.js"></script>

    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 20px; }
        .btn-pay { font-size: 20px; padding: 15px 30px; cursor: pointer; background-color: #28a745; color: white; border: none; border-radius: 5px; }
        #status-display { margin-top: 30px; padding: 15px; border: 1px solid #ccc; background: #f9f9f9; min-height: 50px; text-align: right; }
        .log-entry { margin-bottom: 10px; border-bottom: 1px dotted #ddd; padding-bottom: 5px; }
    </style>
</head>
<body>

    <h1>إتمام عملية الدفع</h1>
    
    <p>اضغط على الزر أدناه لبدء عملية الدفع بمبلغ 100 جنيه مصري.</p>

    <button id="payButton" class="btn-pay" onclick="payNow()">
        ادفع 100 جنيه الآن
    </button>

    <div id="status-display" aria-live="polite">
        <strong>حالة العملية (مراقب النظام):</strong>
        <div id="logs">في انتظار بدء العملية...</div>
    </div>

    <script>
        // وظيفة مساعدة لعرض الرسائل على الشاشة بدلاً من الـ Console
        function logToScreen(message) {
            const logsDiv = document.getElementById('logs');
            const newLog = document.createElement('div');
            newLog.className = 'log-entry';
            newLog.innerText = "• " + message;
            logsDiv.prepend(newLog); // إضافة الرسالة الجديدة في الأعلى
        }

        // 1. تهيئة المشروع باستخدام المعرف الخاص بك (121)
        try {
            GammalTech.init(121);
            logToScreen("تم تهيئة النظام بنجاح للمشروع رقم 121");
        } catch (e) {
            logToScreen("خطأ في التهيئة: " + e.message);
        }

        function payNow() {
            logToScreen("بدء استدعاء نافذة الدفع... جاري التحميل");
            
            try {
                // 2. تنفيذ عملية الدفع
                GammalTech.pay(100, 'My Product', function (response) {
                    // هذه الدالة تنفذ عند نجاح العملية
                    logToScreen("تم استلام استجابة من الخادم ✅");
                    alert('تمت عملية الدفع بنجاح 🎉');
                });
            } catch (error) {
                logToScreen("حدث خطأ تقني: " + error.message);
            }
        }

        // التأكد من تحميل المكتبة
        window.onload = function() {
            if (typeof GammalTech !== 'undefined') {
                logToScreen("مكتبة GammalTech جاهزة للعمل ✅");
            } else {
                logToScreen("خطأ: لم يتم تحميل مكتبة SDK، تأكد من اتصال الإنترنت");
            }
        };
    </script>

</body>
</html>
