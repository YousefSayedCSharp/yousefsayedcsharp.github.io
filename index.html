<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8">
    <title>بوابة الدفع - تسجيل الدخول أولاً</title>
    <script src="https://api.gammal.tech/sdk-web.js?v=121"></script>
</head>
<body style="text-align:center; padding-top:50px; font-family: sans-serif;">

    <h1>بوابة دفع مشروع يوسف</h1>

    <button id="loginBtn" style="padding:15px; font-size:18px; background-color: #0056b3; color: white; border: none; border-radius: 5px; cursor:pointer;">
        1. تسجيل الدخول (اضغط هنا أولاً)
    </button>

    <br><br>

    <button id="payBtn" style="padding:15px; font-size:18px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor:pointer;">
        2. ادفع الآن (بعد تسجيل الدخول)
    </button>

    <div id="status" aria-live="assertive" style="margin-top:20px; color: blue;">
        الحالة: في انتظار تسجيل الدخول...
    </div>

    <script>
        const statusDiv = document.getElementById('status');

        // وظيفة زر تسجيل الدخول
        document.getElementById('loginBtn').onclick = function() {
            statusDiv.innerText = "جاري فتح نافذة تسجيل الدخول...";
            GammalTech.login(function (user) {
                // هذه الدالة تنفذ بعد نجاح تسجيل الدخول
                statusDiv.style.color = "green";
                statusDiv.innerText = "تم تسجيل الدخول بنجاح! يمكنك الدفع الآن.";
                console.log("User logged in:", user);
            });
        };

        // وظيفة زر الدفع
        document.getElementById('payBtn').onclick = function() {
            statusDiv.style.color = "orange";
            statusDiv.innerText = "جاري محاولة فتح نافذة الدفع...";
            
            try {
                GammalTech.pay(100, 'My Product', function (response) {
                    statusDiv.style.color = "green";
                    statusDiv.innerText = "تمت عملية الدفع بنجاح 🎉";
                    alert('شكراً لك! تم الدفع بنجاح.');
                });
            } catch (err) {
                statusDiv.style.color = "red";
                statusDiv.innerText = "خطأ: " + err.message;
            }
        };
    </script>

</body>
</html>
